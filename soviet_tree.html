<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive USSR Research Tree</title>
<style>
    body {
        margin: 0;
        background-color: #111;
        color: #ddd;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #nav-buttons {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 2000;
        display: flex;
        gap: 10px;
    }
    .nav-btn {
        padding: 10px 20px;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        transition: transform 0.1s, box-shadow 0.1s;
    }
    .nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 10px rgba(0,0,0,0.8);
    }
    #tree-container {
        position: relative;
        display: inline-block;
        user-select: none; 
    }
    #bg-image {
        display: block;
    }
    .node-overlay {
        position: absolute;
        cursor: pointer;
        transition: background-color 0.2s, box-shadow 0.2s;
        border-radius: 4px;
        background-color: transparent;
    }
    .node-overlay:hover {
        background-color: rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }
    
    .overlay-badges {
        position: absolute;
        top: -10px;
        right: -22px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        pointer-events: none;
    }
    .overlay-badge {
        width: 30px;
        height: 30px;
        border-radius: 3px;
        background: rgba(0,0,0,0.8);
        border: 1px solid #555;
        object-fit: contain;
    }
    .badge-text {
        color: gold;
        font-size: 16px;
        line-height: 20px;
        text-align: center;
        font-weight: bold;
        box-sizing: border-box;
    }
    
    /* Modal Styles */
    #modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(4px);
    }
    #modal-overlay.active {
        display: flex;
    }
    #modal-box {
        background: #222;
        border: 1px solid #444;
        border-radius: 8px;
        padding: 20px;
        max-width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        position: relative;
    }
    #close-btn {
        position: absolute;
        top: 15px; right: 15px;
        background: #d32f2f;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 5px 10px;
        cursor: pointer;
        font-weight: bold;
    }
    #close-btn:hover { background: #b71c1c; }
    
    h2 { margin-top: 0; color: #fff; border-bottom: 1px solid #555; padding-bottom: 10px; }
    
    table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 15px;
        font-size: 14px;
    }
    th, td {
        border: 1px solid #555;
        padding: 8px 12px;
        text-align: center;
        vertical-align: middle;
    }
    th {
        background: #333;
        color: #fff;
        position: sticky;
        top: 0;
    }
    tr:nth-child(even) { background: #2a2a2a; }
    tr:hover { background: #3a3a3a; }
    
    .row-header {
        background: #333;
        font-weight: bold;
        color: #fff;
        text-align: left;
        width: 120px;
    }
    
    .skills-list { text-align: left; margin: 0; padding-left: 15px; font-size: 12px; }
    .perks-list { text-align: left; margin: 0; padding-left: 15px; font-size: 12px; color: #4caf50; }
    .motorized-badge { display: inline-block; background: #1565c0; color: white; padding: 3px 6px; border-radius: 4px; font-size: 12px; margin-left: 10px; vertical-align: middle; }
    
    .icon-img {
        max-height: 40px;
        border-radius: 4px;
    }
</style>
</head>

    const container = document.getElementById('tree-container');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalContent = document.getElementById('modal-content');
    const closeBtn = document.getElementById('close-btn');

        'shotgun': 'shotgun.png',
        'vehicle': 'vehicle.png',

        'at_rifle': 'at_rifle.png',
        'binocular': 'binocular.png',
        'stealth_buff': 'stealth_buff.png',
        'recon': 'recon.png',
        'tech': 'engineer.png',
        'stg': 'assault_rifle.png',
        'atrifle': 'at_rifle.png'
    };

    function getSquad(name) {
        if (!name) return null;
        if (squadsData[name]) return squadsData[name];
        
        let match = squadsData['single_' + name];
        if (match) return match;
        
        match = squadsData['squad_' + name + '_con'];
        if (match) return match;
        
        const keys = Object.keys(squadsData);
        for (let k of keys) {
            if (k.toLowerCase().includes(name.toLowerCase())) {
                return squadsData[k];
            }
        }
        return null;
    }

    manualData.nodes.forEach(node => {
        if (!node.text || node.text === 'Unknown') return;

        const overlay = document.createElement('div');
        overlay.className = 'node-overlay';
        overlay.style.left = node.x + 'px';
        overlay.style.top = node.y + 'px';
        overlay.style.width = (node.width || node.w) + 'px';
        overlay.style.height = (node.height || node.h) + 'px';
        
        overlay.title = node.text;

        const squad = getSquad(node.text);
        if (squad) {
            const badgesDiv = document.createElement('div');
            badgesDiv.className = 'overlay-badges';
            
            const hasVision = squad.units.some(u => u.vision_range_m >= 125);
            const hasStealth = squad.units.some(u => u.special_perks && u.special_perks.includes('stealth'));
            const hasOfficer = squad.units.some(u => u.unit_name.toLowerCase().includes('officer'));
            const hasBazooka = squad.units.some(u => u.icon === 'bazooka' || u.icon === 'atrifle' || u.unit_name.toLowerCase().includes('pzf') || u.unit_name.toLowerCase().includes('schreck'));
            const hasMg = squad.units.some(u => u.icon === 'mg');

            if (hasOfficer) {
                badgesDiv.innerHTML += `<img src="icons_split/binocular.png" class="overlay-badge" title="Officer">`;
            }
            if (hasVision) {
                badgesDiv.innerHTML += `<img src="icons_split/recon.png" class="overlay-badge" title="125m+ Vision">`;
            }
            if (hasStealth) {
                badgesDiv.innerHTML += `<img src="icons_split/stealth_buff.png" class="overlay-badge" title="Stealth">`;
            }
            if (hasBazooka) {
                badgesDiv.innerHTML += `<img src="icons_split/bazooka.png" class="overlay-badge" title="Anti-Tank">`;
            }
            if (hasMg) {
                badgesDiv.innerHTML += `<img src="icons_split/mg.png" class="overlay-badge" title="Machine Gun">`;
            }
            
            if (badgesDiv.innerHTML !== '') {
                overlay.appendChild(badgesDiv);
            }
        }

        overlay.addEventListener('click', () => {
            openSquadDetails(node.text);
        });

        container.appendChild(overlay);
    });

    function formatPerks(perksArr) {
        if (!perksArr || perksArr.length === 0) return '-';
        let html = '<ul class="perks-list">';
        perksArr.forEach(p => {
            html += `<li>${p.charAt(0).toUpperCase() + p.slice(1)}</li>`;
        });
        html += '</ul>';
        return html;
    }

    function getIconUrl(iconName) {
        if (!iconName) return 'icons_split/rifle.png';
        if (iconMap[iconName]) return 'icons_split/' + iconMap[iconName];
        return 'icons_split/smg.png'; 
    }

    function formatTier(tierStr) {
        if (!tierStr) return '-';
        if (tierStr === 'civilian') return '0';
        const m = tierStr.match(/tier(d+)/);
        if (m) {
            const num = parseInt(m[1]);
            const roman = ['I', 'II', 'III', 'IV', 'V'];
            return roman[num - 1] || num;
        }
        return tierStr;
    }

    function openSquadDetails(textKey) {
        const squad = getSquad(textKey);
        
        if (!squad) {
            modalContent.innerHTML = `<h2>${textKey}</h2><p>No squad data found in the JSON file. Please ensure the label matches the squad definition exactly.</p>`;
            modalOverlay.classList.add('active');
            return;
        }

        let html = `<h2>${squad.name}`;
        if (squad.is_motorized && squad.vehicle) {
            html += ` <span class="motorized-badge">Motorized: ${squad.vehicle}</span>`;
        }
        html += `</h2>`;

        // Start Table Construction
        html += `<table><thead><tr><th class="row-header">Property</th>`;
        
        squad.units.forEach(u => {
            let iconSrc = getIconUrl(u.icon);
            html += `<th><img src="${iconSrc}" class="icon-img" title="${u.icon}"></th>`;
        });
        html += `</tr></thead><tbody>`;

        // Row 1: Quantity
        html += `<tr><td class="row-header">Quantity</td>`;
        squad.units.forEach(u => {
            html += `<td>x${u.entity_count || 1}</td>`;
        });
        html += `</tr>`;

        // Row 2: Tier
        html += `<tr><td class="row-header">Tier</td>`;
        squad.units.forEach(u => {
            html += `<td>${formatTier(u.tier)}</td>`;
        });
        html += `</tr>`;

        // Row 3: HP (Regen)
        html += `<tr><td class="row-header">HP (Regen)</td>`;
        squad.units.forEach(u => {
            html += `<td>${u.health_percent}% <br><small style="color: #bbb;">(+${u.health_regeneration_percent}%)</small></td>`;
        });
        html += `</tr>`;

        // Row 4: Stamina (Regen)
        html += `<tr><td class="row-header">Stam (Regen)</td>`;
        squad.units.forEach(u => {
            html += `<td>${u.stamina_percent}% <br><small style="color: #bbb;">(+${u.stamina_regeneration_percent}%)</small></td>`;
        });
        html += `</tr>`;

        // Row 5: Speed
        html += `<tr><td class="row-header">Speed</td>`;
        squad.units.forEach(u => {
            html += `<td>${u.speed.toFixed(2)}x</td>`;
        });
        html += `</tr>`;

        // Row 6: Vision
        html += `<tr><td class="row-header">Vision</td>`;
        squad.units.forEach(u => {
            html += `<td>${u.vision_range_m}m</td>`;
        });
        html += `</tr>`;

        // --- SKILL ROWS (Dynamic) ---
        let allSkills = new Set();
        squad.units.forEach(u => {
            if (u.skills) {
                Object.keys(u.skills).forEach(s => allSkills.add(s));
            }
        });
        
        const skillOrder = ['pistol', 'smg', 'rifle', 'mgun_light', 'mgun', 'rocketlauncher'];
        const displaySkills = Array.from(allSkills).sort((a, b) => {
            let ia = skillOrder.indexOf(a);
            let ib = skillOrder.indexOf(b);
            if (ia === -1) ia = 99;
            if (ib === -1) ib = 99;
            return ia - ib;
        });

        displaySkills.forEach(skill => {
            let sLabel = skill.charAt(0).toUpperCase() + skill.slice(1);
            if (skill === 'mgun_light') sLabel = 'Light MG';
            if (skill === 'rocketlauncher') sLabel = 'Anti-Tank';
            
            html += `<tr><td class="row-header">${sLabel}</td>`;
            squad.units.forEach(u => {
                let lvl = (u.skills && u.skills[skill] !== undefined) ? u.skills[skill] : '-';
                html += `<td>${lvl}</td>`;
            });
            html += `</tr>`;
        });

        // Row Last: Perks
        html += `<tr><td class="row-header">Perks</td>`;
        squad.units.forEach(u => {
            html += `<td>${formatPerks(u.special_perks)}</td>`;
        });
        html += `</tr>`;

        html += `</tbody></table>`;

        modalContent.innerHTML = html;
        modalOverlay.classList.add('active');
    }

    closeBtn.addEventListener('click', () => {
        modalOverlay.classList.remove('active');
    });

    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            modalOverlay.classList.remove('active');
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
            modalOverlay.classList.remove('active');
        }
    });

</script>
</body>
</html>
